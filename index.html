<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Atm card 3D</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Courier New', monospace;
      padding: 1rem;
      margin: 0;
    }

    .scene {
      width: 100%;
      max-width: 480px;
      margin: 20px auto;
      perspective: 1500px;
      -webkit-perspective: 1500px;
      display: flex;
      justify-content: center;
      align-items: center;
      touch-action: pan-y pinch-zoom;
    }

    .card {
      width: 100%;
      max-width: 420px;
      aspect-ratio: 1.586 / 1;
      position: relative;
      transform-style: preserve-3d;
      cursor: grab;
      touch-action: none;
      transform-origin: 50% 50%;
      will-change: transform;
      transition: transform 0.3s ease;
    }

    .card:active {
      cursor: grabbing;
    }

    .card-front, .card-back {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 28px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 30px 40px -15px rgba(0, 0, 0, 0.8);
      overflow: hidden;
      pointer-events: none;
    }

    .card-front {
      --card-bg-start: #1f1f1f;
      --card-bg-end: #0b0b0b;
      --circle1-color: #239f40;
      --circle2-color: #da121a;
      --chip-color: #d4af37;
      
      background: linear-gradient(145deg, var(--card-bg-start), var(--card-bg-end));
      border: 1px solid rgba(100, 100, 100, 0.3);
      transform: rotateY(0deg);
      padding: 1.5rem 1.2rem;
      justify-content: space-between;
      isolation: isolate;
    }

    .card-back {
      --card-back-start: #1a1a1a;
      --card-back-end: #0a0a0a;
      
      background: linear-gradient(145deg, var(--card-back-start), var(--card-back-end));
      transform: rotateY(180deg);
      border: 1px solid #333;
    }

    .magnetic-strip {
      width: 100%;
      height: 25%;
      background: #111;
      margin-top: 15px;
      border-top: 2px solid #333;
      border-bottom: 2px solid #333;
      box-shadow: inset 0 0 10px #000;
    }

    .glare {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 28px;
      background: radial-gradient(circle at 30% 50%, rgba(255, 255, 255, 0.25) 0%, transparent 70%);
      pointer-events: none;
      opacity: 0.5;
      mix-blend-mode: overlay;
      transition: opacity 0.1s ease, background 0.1s ease;
      will-change: opacity, background;
      z-index: 2;
    }

    .card-header {
      position: relative;
      width: 100%;
      height: 50px;
      flex-shrink: 0;
      z-index: 4;
    }

    .circles {
      position: absolute;
      left: 0;
      top: 0;
      width: 80px;
      height: 50px;
      pointer-events: none;
    }
    .circle1, .circle2 {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      position: absolute;
      background: linear-gradient(135deg, var(--circle1-color), var(--circle2-color));
      box-shadow: 0 0 8px rgba(200,200,200,0.3);
      border: 1px solid #aaa;
    }
    .circle1 {
      left: 0;
      z-index: 2;
    }
    .circle2 {
      left: 20px;
      z-index: 1;
      opacity: 0.9;
    }

    .chip-section {
      display: flex;
      align-items: center;
      margin: 5px 0 10px;
      flex-shrink: 0;
      justify-content: flex-start;
      pointer-events: none;
      z-index: 4;
    }
    .chip {
      width: 48px;
      height: 36px;
      background: linear-gradient(145deg, var(--chip-color), color-mix(in srgb, var(--chip-color), black 30%));
      border-radius: 8px;
      position: relative;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.8), 0 4px 8px rgba(0,0,0,0.6);
      border: 1px solid color-mix(in srgb, var(--chip-color), white 20%);
    }
    .chip::before {
      content: "";
      position: absolute;
      width: 80%;
      height: 2px;
      background: color-mix(in srgb, var(--chip-color), white 40%);
      left: 10%;
      top: 30%;
      box-shadow: 0 8px 0 color-mix(in srgb, var(--chip-color), white 40%);
    }
    .chip::after {
      content: "";
      position: absolute;
      width: 2px;
      height: 70%;
      background: color-mix(in srgb, var(--chip-color), white 40%);
      left: 30%;
      top: 15%;
      box-shadow: 8px 0 0 color-mix(in srgb, var(--chip-color), white 40%);
    }

    .number-wrapper {
      width: 100%;
      margin: 5px 0 5px;
      display: flex;
      justify-content: flex-start;
      overflow: visible;
      flex-shrink: 0;
      pointer-events: none;
      z-index: 4;
    }

    /* ===== رفع مشکل underline در سافاری ===== */
    .card-number {
      font-family: 'Courier New', monospace;
      font-size: 2.2rem;
      font-weight: 700 !important;
      color: #ffffff !important;
      -webkit-text-fill-color: #ffffff !important; /* برای سافاری */
      text-shadow: 0 2px 4px black;
      letter-spacing: 4px;
      white-space: nowrap;
      transform-origin: right center;
      background: rgba(0,0,0,0.5);
      padding: 0.2rem 0.8rem;
      border-radius: 16px;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255,255,255,0.15);
      cursor: pointer;
      transition: background 0.2s;
      
      /* مهم: حذف خط زیر */
      text-decoration: none !important;
      -webkit-text-decoration: none !important;
      text-decoration-line: none !important;
      -webkit-text-decoration-line: none !important;
      
      /* جلوگیری از استایل پیش‌فرض لینک */
      border-bottom: none !important;
      -webkit-border-bottom: none !important;
      
      outline: 0;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.3;
      pointer-events: auto;
    }
    .card-number:active {
      background: #3a3a3a !important;
      color: #ffffff !important;
    }

    .card-holder {
      font-family: 'Segoe UI', 'Courier New', monospace;
      font-size: 1rem;
      letter-spacing: 2px;
      color: #ccc;
      text-transform: uppercase;
      padding: 0 5px;
      margin-bottom: 5px;
      text-align: left;
      flex-shrink: 0;
      pointer-events: none;
      z-index: 4;
    }

    /* پالت رنگ */
    .color-palette {
      display: flex;
      gap: 10px;
      margin: 20px 0;
      flex-wrap: wrap;
      justify-content: center;
    }
    .color-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.3);
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }
    .color-btn:hover {
      transform: scale(1.1);
      border-color: white;
    }
    .color-btn.active {
      border-color: gold;
      transform: scale(1.1);
    }

    .instruction {
      text-align: center;
      margin-top: 20px;
      background: rgba(20,20,30,0.7);
      backdrop-filter: blur(8px);
      padding: 12px 24px;
      border-radius: 60px;
      border: 1px solid rgba(150,150,150,0.3);
      color: #ccc;
      width: fit-content;
      max-width: 90%;
      font-size: 0.95rem;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #2e7d32;
      color: white;
      padding: 10px 20px;
      border-radius: 40px;
      font-size: 0.9rem;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 1000;
    }
    .toast.show {
      opacity: 1;
    }

    .footer-note {
      color: #5a5a6a;
      margin-top: 20px;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="card" id="bankCard">
      <div class="card-front" id="cardFront">
        <div class="glare" id="glareFront"></div>
        <div class="card-header">
          <div class="circles">
            <div class="circle1"></div>
            <div class="circle2"></div>
          </div>
        </div>
        <div class="chip-section">
          <div class="chip"></div>
        </div>
        <div class="number-wrapper" id="numberWrapper">
          <div class="card-number" id="cardNumber" dir="ltr">
            6666 6666 6666 6666
          </div>
        </div>
        <div class="card-holder">M. SENSI</div>
      </div>
      <div class="card-back" id="cardBack">
        <div class="glare" id="glareBack"></div>
        <div class="magnetic-strip"></div>
      </div>
    </div>
  </div>

  <!-- پالت رنگ -->
  <div class="color-palette">
    <div class="color-btn active" style="background: #1f1f1f;" data-theme="black" title="مشکی"></div>
    <div class="color-btn" style="background: #1a3b5c;" data-theme="navy" title="آبی نفتی"></div>
    <div class="color-btn" style="background: #2d5a27;" data-theme="green" title="سبز تیره"></div>
    <div class="color-btn" style="background: #5a2d2d;" data-theme="maroon" title="شرابی"></div>
    <div class="color-btn" style="background: #3a3f44;" data-theme="gunmetal" title="تفنگی"></div>
  </div>

  <div class="instruction">
    Atm Card 3D
  </div>

  <div class="toast" id="toast">✅کپی شد</div>

  <div class="footer-note">
    SensiGroup
  </div>

  <script>
    (function() {
      const card = document.getElementById('bankCard');
      const cardFront = document.getElementById('cardFront');
      const cardBack = document.getElementById('cardBack');
      const cardNumber = document.getElementById('cardNumber');
      const toast = document.getElementById('toast');
      const numberWrapper = document.getElementById('numberWrapper');
      const glareFront = document.getElementById('glareFront');
      const glareBack = document.getElementById('glareBack');

      // تم‌های رنگی
      const themes = {
        black: {
          cardStart: '#1f1f1f', cardEnd: '#0b0b0b',
          backStart: '#1a1a1a', backEnd: '#0a0a0a',
          circle1: '#239f40', circle2: '#da121a', chip: '#d4af37'
        },
        navy: {
          cardStart: '#1a3b5c', cardEnd: '#0a1f2e',
          backStart: '#0f2638', backEnd: '#05121c',
          circle1: '#3a7ca5', circle2: '#b3442c', chip: '#d4af37'
        },
        green: {
          cardStart: '#2d5a27', cardEnd: '#1a3417',
          backStart: '#1f3f1b', backEnd: '#10220e',
          circle1: '#4caf50', circle2: '#8bc34a', chip: '#d4af37'
        },
        maroon: {
          cardStart: '#5a2d2d', cardEnd: '#2e1717',
          backStart: '#3d1f1f', backEnd: '#1e0f0f',
          circle1: '#b85c5c', circle2: '#c98b8b', chip: '#d4af37'
        },
        gunmetal: {
          cardStart: '#3a3f44', cardEnd: '#1e2124',
          backStart: '#2a2e32', backEnd: '#15181b',
          circle1: '#7e8a8e', circle2: '#b0b7bb', chip: '#d4af37'
        }
      };

      function setTheme(themeName) {
        const theme = themes[themeName];
        if (!theme) return;
        cardFront.style.setProperty('--card-bg-start', theme.cardStart);
        cardFront.style.setProperty('--card-bg-end', theme.cardEnd);
        cardBack.style.setProperty('--card-back-start', theme.backStart);
        cardBack.style.setProperty('--card-back-end', theme.backEnd);
        cardFront.style.setProperty('--circle1-color', theme.circle1);
        cardFront.style.setProperty('--circle2-color', theme.circle2);
        cardFront.style.setProperty('--chip-color', theme.chip);
        document.querySelectorAll('.color-btn').forEach(btn => {
          btn.classList.remove('active');
          if (btn.dataset.theme === themeName) btn.classList.add('active');
        });
      }

      document.querySelectorAll('.color-btn').forEach(btn => {
        btn.addEventListener('click', () => setTheme(btn.dataset.theme));
      });
      setTheme('black');

      // تنظیم scale شماره
      function adjustNumberScale() {
        if (!cardNumber || !numberWrapper) return;
        cardNumber.style.transform = 'none';
        const textWidth = cardNumber.scrollWidth;
        const containerWidth = numberWrapper.clientWidth;
        if (textWidth > containerWidth) {
          const scale = containerWidth / textWidth;
          cardNumber.style.transform = `scale(${scale})`;
          cardNumber.style.transformOrigin = 'right center';
        } else {
          cardNumber.style.transform = 'scale(1)';
        }
      }
      window.addEventListener('load', adjustNumberScale);
      window.addEventListener('resize', adjustNumberScale);
      setTimeout(adjustNumberScale, 100);

      // چرخش با اینرسی
      let currentRotateY = 0, velocity = 0, inertiaFrame = null, isDragging = false;
      let lastX = 0, lastTime = 0;
      const SENSITIVITY = 0.8, INERTIA_DAMPING = 0.95, MIN_VELOCITY = 0.01;

      function updateGlare(angle) {
        const rad = angle * Math.PI / 180;
        const cosAngle = Math.cos(rad);
        const frontOpacity = 0.4 + 0.4 * cosAngle;
        const backOpacity = 0.4 - 0.4 * cosAngle;
        if (glareFront) glareFront.style.opacity = frontOpacity;
        if (glareBack) glareBack.style.opacity = backOpacity;
        const posX = 30 + 20 * Math.sin(rad);
        const posY = 50 + 10 * Math.cos(rad * 2);
        if (glareFront) glareFront.style.background = `radial-gradient(circle at ${posX}% ${posY}%, rgba(255, 255, 255, 0.3) 0%, transparent 70%)`;
        if (glareBack) glareBack.style.background = `radial-gradient(circle at ${100 - posX}% ${posY}%, rgba(255, 255, 255, 0.2) 0%, transparent 70%)`;
      }

      function setRotation(angle) {
        currentRotateY = angle;
        card.style.transform = `rotateY(${currentRotateY}deg)`;
        updateGlare(currentRotateY);
      }

      function startInertia(initialVelocity) {
        if (inertiaFrame) cancelAnimationFrame(inertiaFrame);
        velocity = initialVelocity;
        function step() {
          if (Math.abs(velocity) < MIN_VELOCITY || isDragging) {
            inertiaFrame = null;
            return;
          }
          currentRotateY += velocity;
          setRotation(currentRotateY);
          velocity *= INERTIA_DAMPING;
          inertiaFrame = requestAnimationFrame(step);
        }
        inertiaFrame = requestAnimationFrame(step);
      }

      card.addEventListener('pointerdown', (e) => {
        if (e.button !== 0 && e.pointerType !== 'touch') return;
        if (inertiaFrame) { cancelAnimationFrame(inertiaFrame); inertiaFrame = null; }
        isDragging = true;
        lastX = e.clientX;
        lastTime = performance.now();
        card.style.transition = 'none';
        card.setPointerCapture(e.pointerId);
        e.preventDefault();
      });

      card.addEventListener('pointermove', (e) => {
        if (!isDragging) return;
        const currentX = e.clientX;
        const currentTime = performance.now();
        const deltaX = currentX - lastX;
        const deltaTime = currentTime - lastTime;
        if (Math.abs(deltaX) > 1) {
          const vel = (deltaX * SENSITIVITY) / deltaTime;
          velocity = vel * 16;
          currentRotateY += deltaX * SENSITIVITY;
          setRotation(currentRotateY);
          lastX = currentX;
          lastTime = currentTime;
        }
        e.preventDefault();
      });

      card.addEventListener('pointerup', (e) => {
        if (!isDragging) return;
        isDragging = false;
        card.style.transition = 'none';
        card.releasePointerCapture(e.pointerId);
        if (Math.abs(velocity) > MIN_VELOCITY) startInertia(velocity);
        e.preventDefault();
      });

      card.addEventListener('pointercancel', (e) => {
        isDragging = false;
        card.releasePointerCapture(e.pointerId);
        e.preventDefault();
      });

      card.addEventListener('contextmenu', (e) => e.preventDefault());

      // ========== کپی شماره ==========
      function showToast() {
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 1500);
      }

      function copyToClipboard(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text)
            .then(showToast)
            .catch(() => fallbackCopy(text));
        } else {
          fallbackCopy(text);
        }
      }

      function fallbackCopy(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        textarea.style.pointerEvents = 'none';
        document.body.appendChild(textarea);
        try {
          textarea.select();
          textarea.setSelectionRange(0, 99999);
          document.execCommand('copy');
          showToast();
        } catch (err) {
          console.error('Copy failed', err);
          showToast();
        }
        document.body.removeChild(textarea);
      }

      cardNumber.addEventListener('click', (e) => {
        e.stopPropagation();
        e.preventDefault();
        copyToClipboard(cardNumber.innerText.trim());
      });

      cardNumber.addEventListener('touchstart', (e) => {
        e.stopPropagation();
        e.preventDefault();
        copyToClipboard(cardNumber.innerText.trim());
      }, { passive: false });

      const resizeObserver = new ResizeObserver(adjustNumberScale);
      resizeObserver.observe(numberWrapper);

      updateGlare(currentRotateY);
    })();
  </script>
</body>
</html>
